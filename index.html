<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1, user-scalable=no">
  <meta name="theme-color" content="#0f0a1a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Deez">
  <meta name="description" content="Track habits with friends. Send vibes. Reach nirvana together.">
  <title>Deez - Reach Nirvana Together</title>

  <!-- PWA Manifest -->
  <link rel="manifest" href="manifest.json">

  <!-- Icons -->
  <link rel="icon" href="icons/icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icons/icon-192.png">

  <!-- Splash screens for iOS -->
  <meta name="apple-mobile-web-app-title" content="Deez">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- Styles -->
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app"></div>
  <canvas id="confetti-canvas"></canvas>
  <div id="toast-container"></div>
  <div id="modal-root"></div>
  <script src="app.js"></script>
  <script>
    // Register Service Worker for PWA / offline support
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').then((reg) => {
          console.log('Deez SW registered:', reg.scope);
        }).catch((err) => {
          console.log('SW registration failed:', err);
        });
      });
    }
  </script>
</body>
</html>
